<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: Forest-900 -->
  <rect width="1200" height="630" fill="#01311F"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#024a2e" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Gold accent line top -->
  <rect x="80" y="56" width="120" height="3" fill="#C6AA58" rx="2"/>

  <!-- Wordmark: Ribix -->
  <text
    x="80"
    y="108"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="700"
    fill="#C6AA58"
    letter-spacing="-1"
  >Ribix</text>

  <!-- Eyebrow label -->
  <text
    x="80"
    y="148"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="14"
    font-weight="600"
    fill="#C6AA58"
    letter-spacing="2"
    opacity="0.8"
  >AUTONOMOUS QA AGENT</text>

