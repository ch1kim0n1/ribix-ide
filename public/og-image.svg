  <text
    x="80"
    y="290"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="80"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="-2"
  >Your users find bugs.</text>

  <!-- Main headline line 2 (gold) -->
  <text
    x="80"
    y="385"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="80"
    font-weight="700"
    fill="#C6AA58"
    letter-spacing="-2"
  >Ribix finds them first.</text>

  <!-- Divider line -->
  <rect x="80" y="435" width="1040" height="1" fill="#024a2e"/>

  <!-- Bottom workflow description -->
  <text
    x="80"
    y="484"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    fill="#FFFFFF"
    opacity="0.7"
  >Connect staging</text>

  <text
    x="270"
    y="484"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    fill="#C6AA58"
    opacity="0.9"
  >→</text>

  <text
    x="296"
    y="484"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    fill="#FFFFFF"
    opacity="0.7"
  >Ribix finds bugs</text>

  <text
    x="490"
    y="484"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    fill="#C6AA58"
    opacity="0.9"
  >→</text>

  <text
    x="516"
    y="484"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    fill="#FFFFFF"
    opacity="0.7"
  >You approve fixes</text>

  <text
    x="726"
    y="484"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    fill="#C6AA58"
    opacity="0.9"
  >→</text>

  <text
    x="752"
    y="484"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    fill="#FFFFFF"
    opacity="0.7"
