name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check & React Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential g++ \
            libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev \
            python3 python-is-python3

      - uses: actions/setup-node@v5
        with:
          node-version: '20.18.2'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React components
        run: npm run buildreact

      - name: Type check (fast path — no gulp required)
        run: npx tsc --noEmit -p src/tsconfig.json
        # Full gulp compile (~5 min + C++ build tools) is verified on local dev.
        # TSC noEmit catches type errors in CI in ~60s.

  compile:
    name: Full Compile (on main push only)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential g++ \
            libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev \
            python3 python-is-python3

      - uses: actions/setup-node@v5
        with:
          node-version: '20.18.2'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React components
        run: npm run buildreact

      - name: Full TypeScript compile
        run: npm run compile
        timeout-minutes: 15
