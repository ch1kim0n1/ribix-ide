name: Build Release

on:
  push:
    tags:
      - 'v*'

# Required so softprops/action-gh-release can create/update the release and
# upload binaries; without it the upload fails with 403 "Resource not
# accessible by integration".
permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (arm64 + x64)
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      # Skip the TS->TS export mangler for release builds. It is a size optimization
      # only and a dependency .d.ts (google-auth-library) can crash it with OVERLAPPING edit.
      RIBIX_DISABLE_MANGLE: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20.18.2'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # @vscode/ripgrep downloads its binary from GitHub releases during
          # postinstall; without a token GitHub rate-limits with HTTP 403.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: npm run buildreact

      - name: Clean incremental build state
        run: find . -name '*.tsbuildinfo' -delete || true

      - name: Build macOS app (${{ matrix.arch }})
        run: node ./node_modules/gulp/bin/gulp.js vscode-darwin-${{ matrix.arch }}-min
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create DMG
        run: |
          APP_NAME="Ribix IDE"
          ARCH="${{ matrix.arch }}"
          mkdir -p dist
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "../VSCode-darwin-${ARCH}/${APP_NAME}.app" \
            -ov -format UDZO \
            "dist/RibixIDE-${ARCH}.dmg"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RibixIDE-${{ matrix.arch }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      # Skip the TS->TS export mangler for release builds. It is a size optimization
      # only and a dependency .d.ts (google-auth-library) can crash it with OVERLAPPING edit.
      RIBIX_DISABLE_MANGLE: '1'
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential g++ \
            libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev \
            python3 python-is-python3 \
            fakeroot rpm

      - uses: actions/setup-node@v5
        with:
          node-version: '20.18.2'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # @vscode/ripgrep downloads its binary from GitHub releases during
          # postinstall; without a token GitHub rate-limits with HTTP 403.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: npm run buildreact

      - name: Clean incremental build state
        run: find . -name '*.tsbuildinfo' -delete || true

      - name: Build Linux app
        run: node ./node_modules/gulp/bin/gulp.js vscode-linux-x64-min
        timeout-minutes: 45

      - name: Package as tar.gz
        run: |
          mkdir -p dist
          tar czf dist/RibixIDE-linux-x64.tar.gz -C .. VSCode-linux-x64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RibixIDE-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows (x64)
    # Pinned to 2022: windows-latest ships a Visual Studio build that node-gyp
    # 10.x cannot detect ("unknown version undefined"), breaking native rebuilds.
    runs-on: windows-2022
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      # Skip the TS->TS export mangler for release builds. It is a size optimization
      # only and a dependency .d.ts (google-auth-library) can crash it with OVERLAPPING edit.
      RIBIX_DISABLE_MANGLE: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20.18.2'
          cache: 'npm'

      - name: Configure npm retries (avoid node-gyp EBUSY native rebuild lock)
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000
        shell: pwsh

      - name: Install dependencies
        run: npm ci
        env:
          # @vscode/ripgrep downloads its binary from GitHub releases during
          # postinstall; without a token GitHub rate-limits with HTTP 403.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: npm run buildreact

      - name: Clean incremental build state
        run: Get-ChildItem -Recurse -Filter '*.tsbuildinfo' | Remove-Item -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Build Windows app (x64)
        run: node ./node_modules/gulp/bin/gulp.js vscode-win32-x64-min
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package as zip
        run: |
          mkdir -p dist
          Compress-Archive -Path ..\VSCode-win32-x64 -DestinationPath dist\RibixIDE-win32-x64.zip
        shell: pwsh

      # TODO: Code signing for Windows requires a certificate secret (e.g. WINDOWS_CERTIFICATE_PFX).
      # Add signing step here once secrets are configured.

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RibixIDE-win32-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
