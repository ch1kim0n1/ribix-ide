name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build macOS (arm64 + x64)
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20.18.2'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React components
        run: npm run buildreact

      - name: Build macOS app (${{ matrix.arch }})
        run: node ./node_modules/gulp/bin/gulp.js vscode-darwin-${{ matrix.arch }}-min
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create DMG
        run: |
          APP_NAME="Ribix IDE"
          ARCH="${{ matrix.arch }}"
          mkdir -p dist
          hdiutil create -volname "$APP_NAME" \
            -srcfolder ".build/darwin-${ARCH}/${APP_NAME}.app" \
            -ov -format UDZO \
            "dist/RibixIDE-${ARCH}.dmg"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RibixIDE-${{ matrix.arch }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential g++ \
            libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev \
            python3 python-is-python3 \
            fakeroot rpm

      - uses: actions/setup-node@v5
        with:
          node-version: '20.18.2'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React components
        run: npm run buildreact

      - name: Build Linux app
        run: node ./node_modules/gulp/bin/gulp.js vscode-linux-x64-min
        timeout-minutes: 30

      - name: Package as tar.gz
        run: |
          cd .build
          tar czf RibixIDE-linux-x64.tar.gz linux-x64
          mv RibixIDE-linux-x64.tar.gz ../dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RibixIDE-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
